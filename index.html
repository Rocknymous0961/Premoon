<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premoon — Cultural Trend Prediction</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-blur bg-blur-1"></div>
    <div class="bg-blur bg-blur-2"></div>

    <header class="top-nav glass">
      <div class="brand">Premoon</div>
      <nav id="nav-links"></nav>
    </header>

    <main id="app"></main>

    <div id="buyin-modal" class="modal hidden" aria-hidden="true">
      <div class="modal-card glass">
        <h3>Confirm Buy In</h3>
        <p id="modal-trend"></p>
        <div class="modal-grid">
          <div>
            <span class="muted">Entry Tier</span>
            <strong id="modal-tier"></strong>
          </div>
          <div>
            <span class="muted">Estimated Return</span>
            <strong id="modal-return"></strong>
          </div>
        </div>
        <div class="row gap-sm end">
          <button id="modal-cancel" class="btn btn-ghost">Cancel</button>
          <button id="modal-confirm" class="btn btn-primary">Confirm Buy In</button>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
